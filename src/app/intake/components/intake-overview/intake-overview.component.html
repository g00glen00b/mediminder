<mediminder-date-paginator
  [date]="date$$.value"
  (select)="date$$.next($event)">
</mediminder-date-paginator>
<mediminder-intake-list
  swipeGesture
  (swipeLeft)="onSwipeLeft()"
  (swipeRight)="onSwipeRight()"
  [intakes]="(intakes$ | async) || []"
  (complete)="onComplete($event)"
  (openSchedule)="onOpenSchedule($event)">
</mediminder-intake-list>
